apiVersion: apps/v1
kind: Deployment
metadata:
  name: hephaestus-orchestrator
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hephaestus-orchestrator
  template:
    metadata:
      labels:
        app: hephaestus-orchestrator
    spec:
      containers:
        - name: orchestrator
          image: ghcr.io/mozaika228/hephaestus-orchestrator:latest
          ports:
            - containerPort: 8100
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: hephaestus-secrets
                  key: database-url
          readinessProbe:
            httpGet:
              path: /health
              port: 8100
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: hephaestus-orchestrator
spec:
  selector:
    app: hephaestus-orchestrator
  ports:
    - port: 8100
      targetPort: 8100
