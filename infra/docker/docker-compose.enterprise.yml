version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: hephaestus
      POSTGRES_USER: hephaestus
      POSTGRES_PASSWORD: hephaestus
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  neo4j:
    image: neo4j:5
    environment:
      NEO4J_AUTH: neo4j/hephaestus123
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j_data:/data

  jaeger:
    image: jaegertracing/all-in-one:1.58
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"

  prometheus:
    image: prom/prometheus:v2.54.1
    command: ["--config.file=/etc/prometheus/prometheus.yml"]
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.1.4
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  orchestrator:
    build:
      context: ../../services/orchestrator
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://hephaestus:hephaestus@postgres:5432/hephaestus
    depends_on:
      - postgres
    ports:
      - "8100:8100"

  ai:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../../services/ai:/app
    command: ["sh", "-c", "pip install -r requirements.txt && uvicorn app:app --host 0.0.0.0 --port 8000"]
    ports:
      - "8000:8000"

  api:
    image: node:20-alpine
    working_dir: /app
    command: ["sh", "-c", "npm install && node src/index.js"]
    environment:
      HEPHAESTUS_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_SERVICE_URL: http://ai:8000
      ORCHESTRATOR_URL: http://orchestrator:8100
      SQLITE_DB_PATH: /data/hephaestus.db
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 120
    volumes:
      - api_data:/data
      - ../../services/api:/app
    depends_on:
      - ai
      - orchestrator
      - redis
    ports:
      - "4000:4000"

volumes:
  postgres_data:
  neo4j_data:
  api_data:
