services:
  - type: web
    name: hephaestus-web
    runtime: node
    plan: free
    rootDir: .
    buildCommand: corepack enable && pnpm install --no-frozen-lockfile && pnpm --filter hephaestus-web build
    startCommand: pnpm --filter hephaestus-web start
    envVars:
      - key: NEXT_PUBLIC_API_BASE
        value: https://hephaestus-api.onrender.com

  - type: web
    name: hephaestus-api
    runtime: node
    plan: free
    rootDir: services/api
    buildCommand: npm install
    startCommand: node src/index.js
    disk:
      name: hephaestus-api-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: HEPHAESTUS_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_ANALYSIS_MODEL
        value: gpt-4o-mini
      - key: OPENAI_TRANSCRIBE_MODEL
        value: gpt-4o-mini-transcribe
      - key: OPENAI_INSTRUCTIONS
        value: ""
      - key: AZURE_OPENAI_API_KEY
        sync: false
      - key: AZURE_OPENAI_ENDPOINT
        value: ""
      - key: AZURE_OPENAI_DEPLOYMENT
        value: ""
      - key: AZURE_OPENAI_API_VERSION
        value: ""
      - key: LOCAL_MODEL_ENDPOINT
        value: ""
      - key: CUSTOM_PROVIDER_ENDPOINT
        value: ""
      - key: CUSTOM_PROVIDER_AUTH_HEADER
        value: "Authorization"
      - key: CUSTOM_PROVIDER_AUTH_VALUE
        sync: false
      - key: AI_SERVICE_URL
        value: https://hephaestus-ai.onrender.com
      - key: ORCHESTRATOR_URL
        value: https://hephaestus-orchestrator.onrender.com
      - key: SQLITE_DB_PATH
        value: /var/data/hephaestus.db
      - key: ENTERPRISE_SSO_ENABLED
        value: "false"
      - key: SSO_JWT_SECRET
        sync: false
      - key: SAML_ENTRY_POINT
        value: ""
      - key: SAML_ISSUER
        value: hephaestus
      - key: SAML_AUDIENCE
        value: hephaestus-users

  - type: web
    name: hephaestus-ai
    runtime: python
    plan: free
    rootDir: services/ai
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

  - type: web
    name: hephaestus-orchestrator
    runtime: python
    plan: free
    rootDir: services/orchestrator
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false
